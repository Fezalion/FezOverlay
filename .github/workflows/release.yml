name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Get version from tag
        id: get_version
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "tag=$tag" >> $env:GITHUB_OUTPUT
          echo "Version: $version"
          echo "Tag: $tag"

      - name: Generate changelog from commits
        id: changelog
        run: |
          # Determine previous tag (if any)
          $currentTag = "${{ github.ref_name }}"
          Write-Host "Current tag: $currentTag"
          $allTags = git tag --sort=-creatordate
          $previousTag = $null
          if ($allTags) {
            $tagsArray = $allTags -split "`n" | Where-Object { $_ -ne $currentTag }
            if ($tagsArray -and $tagsArray.Count -gt 0) { $previousTag = $tagsArray[0].Trim() }
          }
          if (-not $previousTag) { Write-Host "No previous tag found, using initial commit range" }

          if ($previousTag) {
            $range = "$previousTag..$currentTag"
          } else {
            $range = "$currentTag"
          }

          Write-Host "Commit range: $range"

          # Get commits in the range and format as markdown list
          $commits = git log --pretty=format:'%h %s (%an)' $range
          if (-not $commits) {
            $body = "No changes listed for this release."
          } else {
            $body = "## Changelog`n`n"
            $body += ($commits -split "`n" | ForEach-Object { "- $_`n" }) -join ""
          }

          # Fallback body if empty
          if (-not $body) { $body = "No changes listed for this release." }

          Write-Host "Generated changelog:\n$body"
          echo "changelog<<EOF" >> $env:GITHUB_OUTPUT
          echo $body >> $env:GITHUB_OUTPUT
          echo "EOF" >> $env:GITHUB_OUTPUT

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Linux Dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install Frontend Dependencies
        run: npm install

      - name: Build and Publish Tauri Application
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ steps.get_version.outputs.tag }}
          releaseName: "FezOverlay ${{ github.ref_name }}"
          releaseBody: |
            ## FezOverlay v${{ steps.get_version.outputs.version }}

            ${{ steps.changelog.outputs.changelog }}

          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
