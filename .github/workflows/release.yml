name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history needed to compare tags

      - name: Generate Changelog
        id: changelog
        shell: bash
        run: |
          CURRENT_TAG="${{ github.ref_name }}"
          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v' | sed -n '2p')

          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" "$PREV_TAG"..HEAD)
          fi

          [ -z "$COMMITS" ] && COMMITS="- No changes recorded."

          {
            echo "## What's Changed"
            echo ""
            echo "$COMMITS"
            echo ""
            if [ -n "$PREV_TAG" ]; then
              echo "**Full diff:** [\`$PREV_TAG...$CURRENT_TAG\`](https://github.com/${{ github.repository }}/compare/$PREV_TAG...$CURRENT_TAG)"
            fi
          } > changelog.md

      - name: Read Changelog
        id: read_changelog
        shell: bash
        run: |
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          cat changelog.md >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Linux Dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install Frontend Dependencies
        run: npm install

      - name: Build and Publish Tauri Application
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "FezOverlay ${{ github.ref_name }}"
          releaseBody: ${{ steps.read_changelog.outputs.body }}
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
